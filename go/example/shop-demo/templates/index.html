<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XGDN 支付演示 - 商品列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        .product-name {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 12px;
        }
        .product-desc {
            color: #666;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .product-price {
            font-size: 2em;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .product-price::before {
            content: "¥";
            font-size: 0.6em;
        }
        .buy-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .buy-btn:hover {
            opacity: 0.9;
        }
        .info-box {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .info-box h2 {
            color: #333;
            margin-bottom: 12px;
        }
        .info-box p {
            color: #666;
            line-height: 1.8;
        }
        .info-box code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 XGDN 支付演示商城</h1>
        
        <div class="info-box">
            <h2>📋 使用说明</h2>
            <p>
                1. 点击商品下方的"立即购买"按钮<br>
                2. 系统会创建订单并生成支付二维码<br>
                3. 使用微信扫描二维码完成支付<br>
                4. 支付成功后会自动跳转到结果页面<br>
                <br>
                <strong>提示：</strong>这是演示环境，实际金额为 <code>0.01-0.05</code> 元，可用于真实支付测试。
            </p>
        </div>

        <div class="products">
            {{range .Products}}
            <div class="product-card">
                <div class="product-name">{{.Name}}</div>
                <div class="product-desc">{{.Desc}}</div>
                <div class="product-price">{{printf "%.2f" .Price}}</div>
                <button class="buy-btn" onclick="location.href='/pay?product_id={{.ID}}'">
                    立即购买
                </button>
            </div>
            {{end}}
        </div>
    </div>
</body>
</html>
