<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XGDN 支付演示 - 支付页面</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .product-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .product-name {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
        }
        .product-price {
            font-size: 2.5em;
            color: #e74c3c;
            font-weight: bold;
        }
        .product-price::before {
            content: "¥";
            font-size: 0.6em;
        }
        .qrcode-container {
            margin: 30px 0;
            padding: 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: inline-block;
        }
        #qrcode {
            display: flex;
            justify-content: center;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
        }
        .status.waiting {
            background: #fff3cd;
            color: #856404;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .countdown {
            margin-top: 15px;
            color: #666;
            font-size: 0.9em;
        }
        .back-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
        }
        .back-btn:hover {
            background: #5a6268;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>扫码支付</h1>
        
        <div class="product-info">
            <div class="product-name">{{.Product.Name}}</div>
            <div class="product-price">{{printf "%.2f" .Product.Price}}</div>
        </div>

        <div class="qrcode-container">
            <div id="qrcode"></div>
        </div>

        <div id="status" class="status waiting">
            <span class="loading"></span>
            等待支付中...
        </div>

        <div class="countdown">
            请在 <span id="countdown">5:00</span> 内完成支付
        </div>

        <button class="back-btn" onclick="location.href='/'">返回商城</button>
    </div>

    <script>
        const productID = '{{.Product.ID}}';
        const sseBaseURL = '{{.BaseURL}}';
        let orderNo = null;
        let countdownSeconds = 300;
        let eventSource = null;

        async function createOrder() {
            try {
                const response = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ product_id: productID })
                });

                const result = await response.json();
                
                if (result.code === 0) {
                    orderNo = result.data.order_no;
                    
                    if (result.data.code_url) {
                        new QRCode(document.getElementById('qrcode'), {
                            text: result.data.code_url,
                            width: 200,
                            height: 200,
                            colorDark: '#000000',
                            colorLight: '#ffffff',
                            correctLevel: QRCode.CorrectLevel.M
                        });
                        startSSE();
                        startCountdown();
                    } else if (result.data.pay_url) {
                        document.getElementById('qrcode').innerHTML = 
                            '<div style="padding: 20px; text-align: center;">' +
                            '<p style="margin-bottom: 20px; color: #666;">点击下方按钮跳转到支付页面</p>' +
                            '<a href="' + sseBaseURL + result.data.pay_url + '" target="_blank" style="display: inline-block; padding: 15px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; border-radius: 6px; font-size: 1.1em;">跳转支付</a>' +
                            '</div>';
                        startSSE();
                        startCountdown();
                    } else {
                        document.getElementById('status').className = 'status error';
                        document.getElementById('status').innerHTML = '创建订单失败: 未获取到支付链接';
                    }
                } else {
                    document.getElementById('status').className = 'status error';
                    document.getElementById('status').innerHTML = '创建订单失败: ' + (result.message || '未知错误');
                }
            } catch (error) {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').innerHTML = '创建订单失败: ' + error.message;
            }
        }

        function startSSE() {
            const sseURL = sseBaseURL + '/api/v1/sse/subscribe/' + orderNo;
            console.log('Creating SSE connection to:', sseURL);
            
            try {
                eventSource = new EventSource(sseURL);

                eventSource.addEventListener('connected', function(e) {
                    console.log('SSE 连接已建立');
                });

                eventSource.addEventListener('message', function(e) {
                    try {
                        const data = JSON.parse(e.data);
                        
                        if (data.status === 'paid') {
                            eventSource.close();
                            eventSource = null;
                            document.getElementById('status').className = 'status success';
                            document.getElementById('status').innerHTML = '✓ 支付成功！正在跳转...';
                            
                            setTimeout(() => {
                                window.location.href = '/result?order_no=' + orderNo;
                            }, 1500);
                        }
                    } catch (err) {
                        console.error('SSE 消息解析失败:', err);
                    }
                });

                eventSource.onerror = function(e) {
                    console.error('SSE 连接错误，尝试使用轮询作为后备方案');
                    eventSource.close();
                    eventSource = null;
                    // SSE 失败时回退到轮询
                    startPolling();
                };
            } catch (err) {
                console.error('创建 SSE 失败，使用轮询:', err);
                startPolling();
            }
        }

        function startPolling() {
            console.log('启动轮询作为后备方案');
            document.getElementById('status').innerHTML = '<span class="loading"></span> 等待支付中 (使用轮询)...';
            
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/order-status?order_no=' + orderNo);
                    const result = await response.json();
                    
                    if (result.code === 0 && result.data) {
                        const order = result.data;
                        
                        if (order.status === 1) {
                            clearInterval(pollInterval);
                            document.getElementById('status').className = 'status success';
                            document.getElementById('status').innerHTML = '✓ 支付成功！正在跳转...';
                            
                            setTimeout(() => {
                                window.location.href = '/result?order_no=' + orderNo;
                            }, 1500);
                        }
                    }
                } catch (error) {
                    console.error('轮询订单状态失败:', error);
                }
            }, 2000);
            
            window.pollInterval = pollInterval;
        }

        function startCountdown() {
            const timer = setInterval(() => {
                countdownSeconds--;
                
                if (countdownSeconds <= 0) {
                    clearInterval(timer);
                    document.getElementById('status').className = 'status error';
                    document.getElementById('status').innerHTML = '支付超时，请重新下单';
                    
                    if (eventSource) {
                        eventSource.close();
                        eventSource = null;
                    }
                    return;
                }

                const minutes = Math.floor(countdownSeconds / 60);
                const seconds = countdownSeconds % 60;
                document.getElementById('countdown').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        window.onload = createOrder;

        window.onbeforeunload = function() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            if (window.pollInterval) {
                clearInterval(window.pollInterval);
            }
        };
    </script>
</body>
</html>
